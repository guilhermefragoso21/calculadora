<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora iPhone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="calc" role="application" aria-label="Calculadora">

    <div class="display">
      <div class="hist" id="hist"></div>
      <div class="num"  id="num">0</div>
    </div>

    <div class="btns">
      <button class="btn gray"   data-a="clear">AC</button>
      <button class="btn gray"   data-a="neg">+/−</button>
      <button class="btn gray"   data-a="pct">%</button>
      <button class="btn orange" data-a="op" data-op="÷" id="op-div">÷</button>

      <button class="btn dark" data-a="d" data-d="7">7</button>
      <button class="btn dark" data-a="d" data-d="8">8</button>
      <button class="btn dark" data-a="d" data-d="9">9</button>
      <button class="btn orange" data-a="op" data-op="×" id="op-mul">×</button>

      <button class="btn dark" data-a="d" data-d="4">4</button>
      <button class="btn dark" data-a="d" data-d="5">5</button>
      <button class="btn dark" data-a="d" data-d="6">6</button>
      <button class="btn orange" data-a="op" data-op="−" id="op-sub">−</button>

      <button class="btn dark" data-a="d" data-d="1">1</button>
      <button class="btn dark" data-a="d" data-d="2">2</button>
      <button class="btn dark" data-a="d" data-d="3">3</button>
      <button class="btn orange" data-a="op" data-op="+" id="op-add">+</button>

      <button class="btn dark zero" data-a="d" data-d="0">0</button>
      <button class="btn dark" data-a="dot">.</button>
      <button class="btn orange" data-a="eq">=</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
